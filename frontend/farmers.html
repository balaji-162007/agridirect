<script src="js/language.js?v=1.1"></script>
<script>
function doSearch(inputId = 'globalSearch') {
  const q = document.getElementById(inputId)?.value.trim();
  if (q) { window.location.href = 'products.html?search=' + encodeURIComponent(q); }
}
document.getElementById('globalSearch')?.addEventListener('keypress', e => { if (e.key==='Enter') doSearch(); });
document.getElementById('mobileSearch')?.addEventListener('keypress', e => { if (e.key==='Enter') doSearch('mobileSearch'); });

async function init() {
  if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
  const u = Auth.user;
  
  // Sidebar info
  const nameEl = document.getElementById('dashName');
  const locEl = document.getElementById('dashLoc');
  if (nameEl) nameEl.textContent = u.name;
  if (locEl) locEl.textContent = u.location || '';
  
  // Avatars (Top Nav & Sidebar)
  const navInitial = document.getElementById('navUserInitial');
  if (navInitial) navInitial.textContent = (u.name||'F')[0].toUpperCase();
  
  const avatarEl = document.getElementById('dashAvatar');
  try {
    const fullPhotoUrl = getFullImageUrl(u.profile_photo);
    if (fullPhotoUrl && avatarEl) {
      avatarEl.innerHTML = `<img src="${fullPhotoUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.parentElement.textContent='${(u.name||'F')[0].toUpperCase()}';this.parentElement.style.background=''">`;
      avatarEl.style.background = 'var(--gray-100)';
    } else if (avatarEl) {
      avatarEl.textContent = (u.name||'F')[0].toUpperCase();
      avatarEl.style.background = '';
    }
  } catch(e) { 
    console.error('Avatar init error:', e); 
  }

  loadFarmers();
}

let _allFarmers = [];

async function loadFarmers() {
  const grid = document.getElementById('farmersGrid');
  grid.innerHTML = `<div style="text-align:center;padding:28px;color:var(--gray-400)" data-i18n="loading">Loading…</div>`;
  try {
    const data = await API.getFarmers();
    _allFarmers = data?.farmers || [];
    
    if (!_allFarmers.length) { 
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray-400)">${t('no_farmers')}</div>`; 
      return; 
    }
    
    populateLocationFilter();
    renderFarmers(_allFarmers);
    translatePage();
  } catch(e) { 
    console.error('Farmers list error:', e);
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--red-500)">
      <b>Error loading farmers</b><br><small>${e.message || e}</small>
    </div>`;
  }
}

function populateLocationFilter() {
  const select = document.getElementById('locFilter');
  const locations = [...new Set(_allFarmers.map(f => f.location || 'Tamil Nadu'))].sort();
  
  // Keep the "All" option
  const currentVal = select.value;
  select.innerHTML = `<option value="all" data-i18n="all_locations">${t('all_locations') || 'All Districts'}</option>`;
  
  locations.forEach(loc => {
    const opt = document.createElement('option');
    opt.value = loc;
    opt.textContent = loc;
    select.appendChild(opt);
  });
  
  if (currentVal && [...select.options].some(o => o.value === currentVal)) {
    select.value = currentVal;
  }
}

function filterByLocation() {
  const loc = document.getElementById('locFilter').value;
  if (loc === 'all') {
    renderFarmers(_allFarmers);
  } else {
    const filtered = _allFarmers.filter(f => (f.location || 'Tamil Nadu') === loc);
    renderFarmers(filtered);
  }
}

function renderFarmers(items) {
  const grid = document.getElementById('farmersGrid');
  if (!grid) return;
  
  if (!items.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray-400)">No farmers found in this location</div>`;
    return;
  }

  grid.innerHTML = items.map((f, i) => {
    return `
    <div class="farmer-card" onclick="location.href='products.html?section=farmers&search=${encodeURIComponent(f.name || f.farmer_name || '')}'" style="cursor:pointer">
      <div style="position:relative;width:fit-content;margin:12px auto">
        ${farmerAvatarTag(f, "farmer-avatar-lg", "84px")}
        ${f.is_verified ? '<div class="verified-badge" title="Verified Farmer">✔</div>' : ''}
      </div>
      <div class="farmer-card-name">${f.name || f.farmer_name}</div>
      <div class="farmer-card-loc">📍 ${f.location || 'Tamil Nadu'}</div>
      <div class="stars" style="justify-content:center;margin-bottom:8px">${f.avg_rating ? '★'.repeat(Math.round(f.avg_rating)) + '☆'.repeat(5 - Math.round(f.avg_rating)) : '<span class="text-muted text-sm">No ratings yet</span>'}</div>
      <div class="farmer-stats-row">
        <div><div class="f-stat-num">${f.products_count||0}</div><div class="f-stat-label">Products</div></div>
        <div><div class="f-stat-num">${f.avg_rating ? f.avg_rating + '★' : '—'}</div><div class="f-stat-label">Rating</div></div>
      </div>
      <div style="padding:16px;margin-top:auto">
        <button class="btn btn-outline btn-sm btn-full">View Profile</button>
      </div>
    </div>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', init);
</script>
