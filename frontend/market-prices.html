<script src="js/language.js?v=1.1"></script>
<script>
function doSearch(inputId = 'globalSearch') {
  const q = document.getElementById(inputId)?.value.trim();
  if (q) { window.location.href = 'products.html?search=' + encodeURIComponent(q); }
}
document.getElementById('globalSearch')?.addEventListener('keypress', e => { if (e.key==='Enter') doSearch(); });
document.getElementById('mobileSearch')?.addEventListener('keypress', e => { if (e.key==='Enter') doSearch('mobileSearch'); });

async function init() {
  if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
  const u = Auth.user;
  
  // Sidebar info
  const nameEl = document.getElementById('dashName');
  const locEl = document.getElementById('dashLoc');
  if (nameEl) nameEl.textContent = u.name;
  if (locEl) locEl.textContent = u.location || '';
  
  // Avatars (Top Nav & Sidebar)
  const navInitial = document.getElementById('navUserInitial');
  if (navInitial) navInitial.textContent = (u.name||'F')[0].toUpperCase();
  
  const avatarEl = document.getElementById('dashAvatar');
  try {
    const fullPhotoUrl = getFullImageUrl(u.profile_photo);
    if (fullPhotoUrl && avatarEl) {
      avatarEl.innerHTML = `<img src="${fullPhotoUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.parentElement.textContent='${(u.name||'F')[0].toUpperCase()}';this.parentElement.style.background=''">`;
      avatarEl.style.background = 'var(--gray-100)';
    } else if (avatarEl) {
      avatarEl.textContent = (u.name||'F')[0].toUpperCase();
      avatarEl.style.background = '';
    }
  } catch(e) { 
    console.error('Avatar init error:', e); 
  }

  loadDistricts();
  loadMarketPrices();
}

async function loadDistricts() {
  const select = document.getElementById('districtFilter');
  try {
    const data = await API.getMarketDistricts();
    const districts = data?.districts || [];
    districts.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = currentLang === 'ta' ? (d.name_ta || d.name) : d.name;
      select.appendChild(opt);
    });
  } catch(e) { console.error('Districts error:', e); }
}

async function loadMarketPrices() {
  const tbody = document.getElementById('marketTableBody');
  const districtId = document.getElementById('districtFilter').value;
  
  tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--gray-400)" data-i18n="loading">Loading…</td></tr>`;
  try {
    const params = districtId ? { district_id: districtId } : {};
    const data = await API.getMarketPrices(params);
    const items = data?.prices || [];
    if (!items.length) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--gray-400)">${t('no_market_data')}</td></tr>`; return; }
    tbody.innerHTML = items.map(p => `<tr>
      <td style="text-transform:capitalize">${p.category}</td>
      <td class="fw-600">${currentLang === 'ta' ? (p.name_ta || p.name) : p.name}</td>
      <td class="fw-600 text-green">₹${p.price} / kg</td>
      <td>${p.district_name || '—'}</td>
      <td>${p.market || 'Tamil Nadu'}</td>
    </tr>`).join('');
    translatePage();
  } catch(e) { 
    console.error('Market prices error:', e);
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--red-500)">
      <b>Error loading market prices</b><br><small>${e.message || e}</small>
    </td></tr>`;
  }
}

function toggleSidebar() {
  const s = document.getElementById('marketSidebar');
  const o = document.getElementById('sidebarOverlay');
  if (s) s.classList.toggle('open');
  if (o) o.classList.toggle('open');
}

document.addEventListener('DOMContentLoaded', init);
</script>
